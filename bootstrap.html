<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js">
    <link rel="stylesheet" href="./for_bootstrap.css">
    <title>Bootstrap</title>
</head>
<body>
    <div class="container">
        <div class="main-text">
            <div class="row">
                <div class="col-lg-6 offset-lg-3 text-center">

                    <h1>Как заработать свой первый миллион</h1>
                </div>
            </div>
            <div class="basic">
                <div class="row">
                    <div class="col-lg-6">
                        <iframe width="100%" height="315" src="https://www.youtube.com/embed/53UnXy-V-WQ" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <div class="col-lg-4 text-center">
                        <div class="form">
                            <p class="text-center">Введите ваш email</p>
                            <form action="#">
                                <input type="text" placeholder="Ваше имя" class="form-control input-lg first">
                                <input type="text" placeholder="Ваш email" class="form-control input-lg second">
                                <button class="btn btn-primary btn-lg btn-block form-btn">Принять</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
